<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艾文的工具櫃</title>
<meta name="description" content="教學網站、校務工具、實驗中的東西,都在這。">
<style>
:root {
  --bg: #fafafa;
  --card-bg: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #666;
  --border: #e5e5e5;
  --accent: #2563eb;
  --shadow: 0 4px 12px rgba(0,0,0,0.06);
  --tag-vercel-bg: #111;
  --tag-vercel-fg: #fff;
  --tag-apps-bg: #1a73e8;
  --tag-apps-fg: #fff;
  --tag-local-bg: #16a34a;
  --tag-local-fg: #fff;
  --status-active: #22c55e;
  --status-beta: #eab308;
  --status-broken: #ef4444;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0a0a0a;
    --card-bg: #161616;
    --text: #fafafa;
    --text-secondary: #999;
    --border: #2a2a2a;
    --accent: #60a5fa;
    --shadow: 0 4px 12px rgba(0,0,0,0.3);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 2.5rem 1.25rem 4rem;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 1100px; margin: 0 auto; }
header { margin-bottom: 2rem; }
h1 {
  font-size: 1.85rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
  letter-spacing: -0.02em;
}
.tagline {
  color: var(--text-secondary);
  font-size: 0.95rem;
}
.search-wrap {
  margin-top: 1.5rem;
  position: relative;
}
.search {
  width: 100%;
  padding: 0.8rem 3rem 0.8rem 2.75rem;
  font-size: 0.95rem;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  font-family: inherit;
}
.search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}
.search-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  pointer-events: none;
  font-size: 1.1rem;
}
.kbd {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.75rem;
  padding: 0.15rem 0.45rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-secondary);
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
.section { margin-bottom: 2.25rem; }
.section-title {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-secondary);
  margin-bottom: 0.85rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 0.85rem;
}
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.1rem 0.9rem;
  text-decoration: none;
  color: inherit;
  transition: transform 0.15s ease, border-color 0.15s, box-shadow 0.15s;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}
.card-title {
  font-weight: 600;
  font-size: 1rem;
  letter-spacing: -0.005em;
}
.status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status.active { background: var(--status-active); box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.15); }
.status.beta { background: var(--status-beta); box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.15); }
.status.broken { background: var(--status-broken); box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.15); }
.card-desc {
  font-size: 0.875rem;
  color: var(--text-secondary);
  line-height: 1.5;
  flex-grow: 1;
}
.card-footer {
  margin-top: 0.55rem;
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
}
.tag {
  font-size: 0.68rem;
  padding: 0.18rem 0.5rem;
  border-radius: 5px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.tag.vercel { background: var(--tag-vercel-bg); color: var(--tag-vercel-fg); }
.tag.apps-script { background: var(--tag-apps-bg); color: var(--tag-apps-fg); }
.tag.local { background: var(--tag-local-bg); color: var(--tag-local-fg); }
.empty {
  text-align: center;
  color: var(--text-secondary);
  padding: 3rem 1rem;
  font-size: 0.9rem;
}
footer {
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-secondary);
}
footer .legend {
  display: inline-flex;
  gap: 1rem;
  margin-bottom: 0.5rem;
  flex-wrap: wrap;
  justify-content: center;
}
footer .legend span {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
}
@media (max-width: 600px) {
  body { padding: 1.5rem 1rem 3rem; }
  h1 { font-size: 1.5rem; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>艾文的工具櫃</h1>
    <p class="tagline">教學網站、校務工具、實驗中的東西,都在這。</p>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" class="search" id="search" placeholder="搜尋工具…(標題、說明、標籤)" autocomplete="off">
      <span class="kbd">/</span>
    </div>
  </header>
  <main id="content"></main>
  <footer>
    <div class="legend">
      <span><span class="status active"></span> 使用中</span>
      <span><span class="status beta"></span> 半成品</span>
      <span><span class="status broken"></span> 壞了/廢棄</span>
    </div>
    <div id="last-updated"></div>
  </footer>
</div>

<script>
// ============================================================
// 工具清單 — 新增工具:在下方陣列加一行物件,完全不用動 HTML
// ============================================================
const tools = [
  // ─── 教學網站 ───
  {
    title: "松山高中探究與實作",
    desc: "探究與實作課程教學網站",
    url: "https://sssh-inquiry.vercel.app/",
    tag: "vercel",
    status: "active",
    category: "教學網站"
  },
  {
    title: "研究方法與專題",
    desc: "松山高中研究方法與專題教學網站",
    url: "https://research-navigator-nu.vercel.app/",
    tag: "vercel",
    status: "active",
    category: "教學網站"
  },
  {
    title: "物理漫遊實驗室",
    desc: "物理實驗互動模擬",
    url: "https://physics-lab-sssh.vercel.app/",
    tag: "vercel",
    status: "active",
    category: "教學網站"
  },

  // ─── 校務行政 (Apps Script) ───
  {
    title: "座位與分組系統",
    desc: "排座位、隨機分組",
    url: "https://script.google.com/a/macros/sssh.tp.edu.tw/s/AKfycbyvdkusUZmOFYkVI3Ui-v8idtUHK4ErE5YxtkkkwtqTbI8FgMy-LNCicFUGaSIFQHw/exec",
    tag: "apps-script",
    status: "active",
    category: "校務行政"
  },
  {
    title: "設備管理系統",
    desc: "設備借用、清點、追蹤",
    url: "https://script.google.com/a/macros/sssh.tp.edu.tw/s/AKfycbzXFJCr51h4wzhr0nXxTcDRYG1nTj9U_3WxCvkP1zjJL_X-6SFGZTXdb9THZiuTEPLQ/exec",
    tag: "apps-script",
    status: "active",
    category: "校務行政"
  },
  {
    title: "自主學習平台",
    desc: "學生自主學習計畫管理",
    url: "https://script.google.com/a/macros/sssh.tp.edu.tw/s/AKfycbzQTRrjJ4fgETXGutO0i8o5GSbLhwF43hWWuVprAXPyvpyeVdsP2zqcWiWpYovZ-5LX/exec",
    tag: "apps-script",
    status: "active",
    category: "校務行政"
  },
  {
    title: "場地管理系統",
    desc: "場地預約與排程",
    url: "https://script.google.com/a/macros/sssh.tp.edu.tw/s/AKfycbwne_ySAlRS8iMZKROZKtpFEy4OY81BRNK6goFRYC-R2QoJVZMK6pl69YHV0CMvEqiw4A/exec",
    tag: "apps-script",
    status: "active",
    category: "校務行政"
  },

  // ─── 本機工具 (需先啟動) ───
  {
    title: "學習單批改審核系統",
    desc: "Flask 本機應用 — 需先執行啟動腳本後才會通",
    url: "http://localhost:5050",
    tag: "local",
    status: "active",
    category: "本機工具"
  }
];

// 分類顯示順序(沒列到的會自動排在最後)
const categoryOrder = ["教學網站", "校務行政", "本機工具"];

// ============================================================
// 渲染與搜尋邏輯
// ============================================================
const tagLabels = {
  "vercel": "Vercel",
  "apps-script": "Apps Script",
  "local": "本機"
};

function render(filter = "") {
  const content = document.getElementById("content");
  const f = filter.toLowerCase().trim();
  const filtered = tools.filter(t =>
    !f ||
    t.title.toLowerCase().includes(f) ||
    t.desc.toLowerCase().includes(f) ||
    t.tag.toLowerCase().includes(f) ||
    t.category.toLowerCase().includes(f) ||
    (tagLabels[t.tag] || "").toLowerCase().includes(f)
  );

  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty">沒有符合的工具。試試別的關鍵字?</div>';
    return;
  }

  // 收集所有出現的分類,按 categoryOrder 排序,其餘附在後面
  const cats = [...new Set(filtered.map(t => t.category))];
  cats.sort((a, b) => {
    const ia = categoryOrder.indexOf(a);
    const ib = categoryOrder.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });

  let html = "";
  for (const cat of cats) {
    const items = filtered.filter(t => t.category === cat);
    html += `<section class="section"><div class="section-title">${escapeHtml(cat)}</div><div class="grid">`;
    for (const t of items) {
      const tagLabel = tagLabels[t.tag] || t.tag;
      html += `<a class="card" href="${escapeAttr(t.url)}" target="_blank" rel="noopener noreferrer">
        <div class="card-header">
          <div class="card-title">${escapeHtml(t.title)}</div>
          <div class="status ${t.status}" title="${t.status}"></div>
        </div>
        <div class="card-desc">${escapeHtml(t.desc)}</div>
        <div class="card-footer">
          <span class="tag ${t.tag}">${escapeHtml(tagLabel)}</span>
        </div>
      </a>`;
    }
    html += `</div></section>`;
  }
  content.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// ============================================================
// 互動:搜尋 + 鍵盤快捷鍵
// ============================================================
const search = document.getElementById("search");
search.addEventListener("input", e => render(e.target.value));

document.addEventListener("keydown", e => {
  // 按 / 聚焦搜尋框
  if (e.key === "/" && document.activeElement !== search) {
    e.preventDefault();
    search.focus();
    search.select();
  }
  // 按 Esc 清空並失焦
  if (e.key === "Escape" && document.activeElement === search) {
    search.value = "";
    render();
    search.blur();
  }
});

document.getElementById("last-updated").textContent =
  "最後更新:2026-04-25　·　共 " + tools.length + " 項工具";

render();
</script>
</body>
</html>
