<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艾文的工具櫃</title>
<meta name="description" content="教學網站、校務工具、實驗中的東西,都在這。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='9' width='18' height='12' rx='1.5'/><path d='M8 9V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v3'/><path d='M3 14h18'/></svg>">
<style>
:root {
  --bg: #fafafa;
  --card-bg: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #666;
  --border: #e5e5e5;
  --accent: #2563eb;
  --shadow: 0 4px 12px rgba(0,0,0,0.06);
  --tag-vercel-bg: #111;
  --tag-vercel-fg: #fff;
  --tag-apps-bg: #1a73e8;
  --tag-apps-fg: #fff;
  --tag-local-bg: #16a34a;
  --tag-local-fg: #fff;
  --tag-ghp-bg: #6e40c9;
  --tag-ghp-fg: #fff;
  --status-active: #22c55e;
  --status-beta: #eab308;
  --status-broken: #ef4444;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0a0a0a;
    --card-bg: #161616;
    --text: #fafafa;
    --text-secondary: #999;
    --border: #2a2a2a;
    --accent: #60a5fa;
    --shadow: 0 4px 12px rgba(0,0,0,0.3);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 2.5rem 1.25rem 4rem;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 1100px; margin: 0 auto; }
header { margin-bottom: 2rem; }
h1 {
  font-size: 1.85rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 0.55rem;
}
.title-icon {
  display: inline-flex;
  align-items: center;
  color: var(--accent);
  flex-shrink: 0;
}
.tagline {
  color: var(--text-secondary);
  font-size: 0.95rem;
}
.search-wrap {
  margin-top: 1.5rem;
  position: relative;
}
.search {
  width: 100%;
  padding: 0.8rem 3rem 0.8rem 2.75rem;
  font-size: 0.95rem;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  font-family: inherit;
}
.search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}
.search-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  pointer-events: none;
  font-size: 1.1rem;
}
.kbd {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.75rem;
  padding: 0.15rem 0.45rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-secondary);
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
.section { margin-bottom: 2.25rem; }
.section-title {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-secondary);
  margin-bottom: 0.85rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.cat-icon {
  display: inline-flex;
  align-items: center;
  color: var(--text-secondary);
  flex-shrink: 0;
  letter-spacing: normal;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 0.85rem;
}
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.1rem 0.9rem;
  text-decoration: none;
  color: inherit;
  transition: transform 0.15s ease, border-color 0.15s, box-shadow 0.15s;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  cursor: pointer;
  outline: none;
}
.card:focus-visible {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.card-header {
  display: flex;
  align-items: center;
  gap: 0.55rem;
}
.card-title {
  font-weight: 600;
  font-size: 1rem;
  letter-spacing: -0.005em;
  flex-grow: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.favicon {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  border-radius: 4px;
  object-fit: contain;
}
.click-count {
  margin-left: auto;
  font-size: 0.7rem;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
  padding: 0.15rem 0.5rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 99px;
}
.extras {
  display: inline-flex;
  gap: 0.3rem;
  align-items: center;
}
.extra-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 5px;
  color: var(--text-secondary);
  background: transparent;
  border: 1px solid transparent;
  text-decoration: none;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.extra-link:hover {
  background: var(--bg);
  color: var(--accent);
  border-color: var(--border);
}
.status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status.active { background: var(--status-active); box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.15); }
.status.beta { background: var(--status-beta); box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.15); }
.status.broken { background: var(--status-broken); box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.15); }
.card-desc {
  font-size: 0.875rem;
  color: var(--text-secondary);
  line-height: 1.5;
  flex-grow: 1;
}
.card-footer {
  margin-top: 0.55rem;
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
}
.tag {
  font-size: 0.68rem;
  padding: 0.18rem 0.5rem;
  border-radius: 5px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.tag.vercel { background: var(--tag-vercel-bg); color: var(--tag-vercel-fg); }
.tag.apps-script { background: var(--tag-apps-bg); color: var(--tag-apps-fg); }
.tag.local { background: var(--tag-local-bg); color: var(--tag-local-fg); }
.tag.gh-pages { background: var(--tag-ghp-bg); color: var(--tag-ghp-fg); }
.empty {
  text-align: center;
  color: var(--text-secondary);
  padding: 3rem 1rem;
  font-size: 0.9rem;
}
footer {
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-secondary);
}
footer .legend {
  display: inline-flex;
  gap: 1rem;
  margin-bottom: 0.5rem;
  flex-wrap: wrap;
  justify-content: center;
}
footer .legend span {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
}
@media (max-width: 600px) {
  body { padding: 1.5rem 1rem 3rem; }
  h1 { font-size: 1.5rem; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>
      <span class="title-icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="9" width="18" height="12" rx="1.5"/>
          <path d="M8 9V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v3"/>
          <path d="M3 14h18"/>
        </svg>
      </span>
      艾文的工具櫃
    </h1>
    <p class="tagline">教學網站、校務工具、實驗中的東西,都在這。</p>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" class="search" id="search" placeholder="搜尋工具…(標題、說明、標籤)" autocomplete="off">
      <span class="kbd">/</span>
    </div>
  </header>
  <main id="content"></main>
  <footer>
    <div class="legend">
      <span><span class="status active"></span> 使用中</span>
      <span><span class="status beta"></span> 半成品</span>
      <span><span class="status broken"></span> 壞了/廢棄</span>
    </div>
    <div id="last-updated"></div>
  </footer>
</div>

<script>
// ============================================================
// 工具清單 — 新增工具:在下方陣列加一行物件,完全不用動 HTML
// ------------------------------------------------------------
// 必填欄位:title / desc / url / tag / status / category
// 可選欄位(有填才會顯示對應的小按鈕):
//   dataUrl — 原始資料,例如 Google Sheet 網址
//   codeUrl — 原始碼,例如 Apps Script 編輯器或 GitHub repo
// ============================================================
const tools = [
  // ─── 教學網站 ───
  {
    title: "松山高中探究與實作",
    desc: "探究與實作課程教學網站",
    url: "https://sssh-inquiry.vercel.app/",
    tag: "vercel",
    status: "active",
    category: "教學網站"
  },
  {
    title: "研究方法與專題",
    desc: "松山高中研究方法與專題教學網站",
    url: "https://research-navigator-nu.vercel.app/",
    tag: "vercel",
    status: "active",
    category: "教學網站"
  },
  {
    title: "物理漫遊實驗室",
    desc: "物理實驗互動模擬",
    url: "https://physics-lab-sssh.vercel.app/",
    tag: "vercel",
    status: "active",
    category: "教學網站"
  },

  // ─── 校務行政 (Apps Script) ───
  {
    title: "座位與分組系統",
    desc: "排座位、隨機分組",
    url: "https://script.google.com/a/macros/sssh.tp.edu.tw/s/AKfycbyvdkusUZmOFYkVI3Ui-v8idtUHK4ErE5YxtkkkwtqTbI8FgMy-LNCicFUGaSIFQHw/exec",
    dataUrl: "https://docs.google.com/spreadsheets/d/1nire1N-VDur3PSX0OhBNpPiT0-hzgv7p6jf4e_HyUgM/edit",
    codeUrl: "https://script.google.com/u/0/home/projects/1OGLZ1XIVF516G_zrT8EjA4HB9ElPWoplAH7esd-v7An3TnJ-e50O6dMi/edit",
    tag: "apps-script",
    status: "active",
    category: "校務行政"
  },
  {
    title: "設備管理系統",
    desc: "設備借用、清點、追蹤",
    url: "https://script.google.com/a/macros/sssh.tp.edu.tw/s/AKfycbzXFJCr51h4wzhr0nXxTcDRYG1nTj9U_3WxCvkP1zjJL_X-6SFGZTXdb9THZiuTEPLQ/exec",
    dataUrl: "https://docs.google.com/spreadsheets/d/1HasuCARF-j9SxghbL3_EsuQyuZ_RluxC4RIlZkMzd3I/edit",
    codeUrl: "https://script.google.com/u/0/home/projects/10C-k2GspcrwPlsfbzruTrjDBFmtusJs61IgUQl5QziTV2GbzHWueET93/edit",
    tag: "apps-script",
    status: "active",
    category: "校務行政"
  },
  {
    title: "自主學習平台",
    desc: "學生自主學習計畫管理",
    url: "https://script.google.com/a/macros/sssh.tp.edu.tw/s/AKfycbzQTRrjJ4fgETXGutO0i8o5GSbLhwF43hWWuVprAXPyvpyeVdsP2zqcWiWpYovZ-5LX/exec",
    dataUrl: "https://docs.google.com/spreadsheets/d/1-k9ghXFNeMtNQkDOYuIH67vqxyovlGY-1A2V-0T7R58/edit",
    codeUrl: "https://script.google.com/u/0/home/projects/14nmPC6_-Sb9cBGTovf_wrlTEvdg6iCq0mL3Ne2juZOJbuyvXQvYE3uPC/edit",
    tag: "apps-script",
    status: "active",
    category: "校務行政"
  },
  {
    title: "場地管理系統",
    desc: "場地預約與排程",
    url: "https://script.google.com/a/macros/sssh.tp.edu.tw/s/AKfycbwne_ySAlRS8iMZKROZKtpFEy4OY81BRNK6goFRYC-R2QoJVZMK6pl69YHV0CMvEqiw4A/exec",
    dataUrl: "https://docs.google.com/spreadsheets/d/1c6gCQj_j58Psdj4GaTNGW_bxtHglLuOQl_bIHivdHGw/edit",
    codeUrl: "https://script.google.com/u/0/home/projects/1NgPQboV7PJuBbna_cUAfsx-f3-4qYo0u4lgPICeNPaXv5hN9u7G2HLaN/edit",
    tag: "apps-script",
    status: "active",
    category: "校務行政"
  },

  // ─── 工具 ───
  {
    title: "抽籤",
    desc: "隨機抽籤(課堂點名、分組、抽運勢都能用)",
    url: "https://ivanchen114.github.io/draw.html",
    tag: "gh-pages",
    status: "active",
    category: "工具"
  },

  // ─── 本機工具 (需先啟動) ───
  {
    title: "學習單批改審核系統",
    desc: "Flask 本機應用 — 需先執行啟動腳本後才會通",
    url: "http://localhost:5050",
    tag: "local",
    status: "active",
    category: "本機工具"
  }
];

// 分類顯示順序(沒列到的會自動排在最後)
const categoryOrder = ["教學網站", "校務行政", "工具", "本機工具"];

// 分類前綴 icon(沒列到的就純文字,不影響運作)
const categoryIcons = {
  "教學網站": "book",
  "校務行政": "folder",
  "工具": "wrench",
  "本機工具": "laptop"
};

// SVG icon 路徑(Lucide 風格,線條 24×24 viewBox)
const iconPaths = {
  book: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
  folder: '<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>',
  wrench: '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
  laptop: '<rect x="3" y="5" width="18" height="12" rx="1.5"/><path d="M2 20h20"/>',
  sheet: '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>',
  code: '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>'
};

function renderIcon(name, size) {
  const p = iconPaths[name];
  if (!p) return "";
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
}

// ============================================================
// 渲染與搜尋邏輯
// ============================================================
const tagLabels = {
  "vercel": "Vercel",
  "apps-script": "Apps Script",
  "local": "本機",
  "gh-pages": "GitHub Pages"
};

function render(filter = "") {
  const content = document.getElementById("content");
  const f = filter.toLowerCase().trim();
  const filtered = tools.filter(t =>
    !f ||
    t.title.toLowerCase().includes(f) ||
    t.desc.toLowerCase().includes(f) ||
    t.tag.toLowerCase().includes(f) ||
    t.category.toLowerCase().includes(f) ||
    (tagLabels[t.tag] || "").toLowerCase().includes(f)
  );

  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty">沒有符合的工具。試試別的關鍵字?</div>';
    return;
  }

  // 收集所有出現的分類,按 categoryOrder 排序,其餘附在後面
  const cats = [...new Set(filtered.map(t => t.category))];
  cats.sort((a, b) => {
    const ia = categoryOrder.indexOf(a);
    const ib = categoryOrder.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });

  let html = "";
  for (const cat of cats) {
    const items = filtered.filter(t => t.category === cat);
    const icon = categoryIcons[cat] ? `<span class="cat-icon" aria-hidden="true">${renderIcon(categoryIcons[cat], 16)}</span>` : "";
    html += `<section class="section"><div class="section-title">${icon}${escapeHtml(cat)}</div><div class="grid">`;
    for (const t of items) {
      const tagLabel = tagLabels[t.tag] || t.tag;
      const favicon = getFavicon(t.url);
      const clicks = getClickCount(t.url);
      const extras = [];
      if (t.dataUrl) extras.push(`<a class="extra-link" href="${escapeAttr(t.dataUrl)}" target="_blank" rel="noopener noreferrer" title="原始資料 (Sheet)" aria-label="原始資料">${renderIcon("sheet", 14)}</a>`);
      if (t.codeUrl) extras.push(`<a class="extra-link" href="${escapeAttr(t.codeUrl)}" target="_blank" rel="noopener noreferrer" title="原始碼 / 編輯器" aria-label="原始碼">${renderIcon("code", 14)}</a>`);
      const extrasHtml = extras.length ? `<div class="extras">${extras.join("")}</div>` : "";
      html += `<div class="card" data-url="${escapeAttr(t.url)}" tabindex="0" role="link" aria-label="${escapeAttr(t.title)}">
        <div class="card-header">
          ${favicon ? `<img class="favicon" src="${escapeAttr(favicon)}" alt="" onerror="this.style.display='none'">` : ""}
          <div class="card-title">${escapeHtml(t.title)}</div>
          <div class="status ${t.status}" title="${t.status}"></div>
        </div>
        <div class="card-desc">${escapeHtml(t.desc)}</div>
        <div class="card-footer">
          <span class="tag ${t.tag}">${escapeHtml(tagLabel)}</span>
          ${extrasHtml}
          ${clicks > 0 ? `<span class="click-count" title="點擊次數">↗ ${clicks}</span>` : ""}
        </div>
      </div>`;
    }
    html += `</div></section>`;
  }
  content.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// Favicon — 用 Google 的 favicon 服務,localhost 用內嵌 SVG
const LOCAL_ICON = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M7 10l3 3-3 3M13 16h4"/></svg>'
);
function getFavicon(url) {
  try {
    const u = new URL(url);
    if (u.hostname === "localhost" || u.hostname.startsWith("127.")) return LOCAL_ICON;
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
  } catch { return null; }
}

// 點擊次數 — localStorage,key 用 url
function getClickCount(url) {
  return parseInt(localStorage.getItem("clicks_" + url) || "0", 10);
}
function incrementClickCount(url) {
  localStorage.setItem("clicks_" + url, String(getClickCount(url) + 1));
}

// ============================================================
// 互動:搜尋 + 鍵盤快捷鍵
// ============================================================
const search = document.getElementById("search");
search.addEventListener("input", e => render(e.target.value));

// 點卡片時:打開主入口 + 記次數;若點到的是 .extra-link 則放行,讓那個 <a> 自己處理
function handleCardActivate(target) {
  if (target.closest(".extra-link")) return; // 額外連結自己有 href,不要擋
  const card = target.closest(".card");
  if (!card || !card.dataset.url) return;
  incrementClickCount(card.dataset.url);
  window.open(card.dataset.url, "_blank", "noopener,noreferrer");
  setTimeout(() => render(search.value), 0);
}

const contentEl = document.getElementById("content");
contentEl.addEventListener("click", e => handleCardActivate(e.target));
contentEl.addEventListener("keydown", e => {
  if (e.key === "Enter" || e.key === " ") {
    const card = e.target.closest(".card");
    if (card && card === e.target) {
      e.preventDefault();
      handleCardActivate(e.target);
    }
  }
});

document.addEventListener("keydown", e => {
  // 按 / 聚焦搜尋框
  if (e.key === "/" && document.activeElement !== search) {
    e.preventDefault();
    search.focus();
    search.select();
  }
  // 按 Esc 清空並失焦
  if (e.key === "Escape" && document.activeElement === search) {
    search.value = "";
    render();
    search.blur();
  }
});

document.getElementById("last-updated").textContent =
  "最後更新:2026-04-25　·　共 " + tools.length + " 項工具";

render();
</script>
</body>
</html>
